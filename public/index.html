<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Network — Registration &amp; Certification Platform</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2129;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#bc8cff;--orange:#d2a8ff;--cyan:#79c0ff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px}
.header h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px}
.header .logo{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--bg)}
.nav{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px;position:sticky;top:0;z-index:10}
.nav-item{padding:10px 16px;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;font-size:13px;font-weight:500;transition:.15s}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--accent);border-bottom-color:var(--accent)}
.container{max-width:1400px;margin:0 auto;padding:24px}
.tab{display:none}.tab.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.stat-val{font-size:28px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:12px;color:var(--text-dim);margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.s-discovered{background:#0c2d6b;color:var(--accent)}
.s-registered{background:#1a1a40;color:var(--purple)}
.s-in_review{background:#2d2200;color:var(--yellow)}
.s-changes_requested{background:#2d1500;color:var(--orange)}
.s-certified{background:#0d331a;color:var(--green)}
.s-rejected{background:#3d1214;color:var(--red)}
.s-deprecated{background:#1a1a1a;color:var(--text-dim)}
.s-suspended{background:#3d1214;color:var(--red)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden}
.card-hd{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.card-hd:hover{background:var(--surface2)}
.card-hd h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-bd{padding:18px;display:none;border-top:1px solid var(--border)}
.card-bd.open{display:block}
btn,.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:var(--bg);font-weight:600;border:none}
.btn-primary:hover{opacity:.9}
.btn-green{background:var(--green);color:var(--bg);font-weight:600;border:none}
.btn-red{background:var(--red);color:var(--bg);font-weight:600;border:none}
.btn-yellow{background:var(--yellow);color:var(--bg);font-weight:600;border:none}
.btn-sm{padding:4px 10px;font-size:12px}
input,textarea,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:13px;width:100%;font-family:inherit}
textarea{resize:vertical;min-height:60px}
label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;font-weight:600}
.form-row{margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.market-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;cursor:pointer;transition:.15s}
.market-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.market-card h3{font-size:15px;margin-bottom:6px}
.market-card p{font-size:13px;color:var(--text-dim);margin-bottom:10px}
.market-card .tags{display:flex;flex-wrap:wrap;gap:4px}
.market-card .tag{background:var(--surface2);padding:2px 8px;border-radius:10px;font-size:11px;color:var(--cyan)}
.tbl{width:100%;border-collapse:collapse}
.tbl th,.tbl td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.tbl th{color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.tbl tr:hover{background:var(--surface2)}
.checklist{list-style:none}
.checklist li{padding:6px 0;display:flex;align-items:center;gap:8px;font-size:13px}
.checklist input[type=checkbox]{width:16px;height:16px;accent-color:var(--green)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:var(--bg);padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:100;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.empty{text-align:center;padding:40px;color:var(--text-dim)}
.empty h2{color:var(--text);margin-bottom:8px}
.detail-panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-top:16px}
.dep-tag{background:var(--surface2);padding:3px 10px;border-radius:12px;font-size:12px;color:var(--purple);display:inline-block;margin:2px}
.activity-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;align-items:center;gap:10px}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.network-svg{width:100%;height:500px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
code{background:var(--surface2);padding:2px 6px;border-radius:3px;font-size:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{margin-bottom:16px;font-size:18px}
</style>
</head>
<body>
<div class="header">
  <h1><span class="logo">AN</span>Agent Network Platform</h1>
  <span style="color:var(--text-dim);font-size:13px">soofi.xyz Agent Registry</span>
</div>
<div class="nav">
  <div class="nav-item active" data-tab="dashboard">Dashboard</div>
  <div class="nav-item" data-tab="discovery">Discovery</div>
  <div class="nav-item" data-tab="registry">Registry</div>
  <div class="nav-item" data-tab="certification">Certification</div>
  <div class="nav-item" data-tab="marketplace">Marketplace</div>
  <div class="nav-item" data-tab="network">Network</div>
  <div class="nav-item" data-tab="metrics">Metrics</div>
</div>
<div class="container">

<!-- DASHBOARD TAB -->
<div class="tab active" id="tab-dashboard">
  <div id="dashStats" class="stats"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card"><div class="card-hd"><h3>Agent Inventory by Status</h3></div><div class="card-bd open" id="statusChart"></div></div>
    <div class="card"><div class="card-hd"><h3>Recent Activity</h3></div><div class="card-bd open" id="activityFeed"></div></div>
  </div>
</div>

<!-- DISCOVERY TAB -->
<div class="tab" id="tab-discovery">
  <div style="display:flex;gap:10px;margin-bottom:20px;align-items:end">
    <div style="flex:1"><label>GitHub Owner (org or user)</label><input id="discoverOwner" value="prismteam-ai" placeholder="e.g. prismteam-ai"></div>
    <div style="flex:1"><label>Repository (optional)</label><input id="discoverRepo" placeholder="e.g. soofi-xyz-team-kit"></div>
    <button class="btn btn-primary" onclick="scanGithub()">Scan GitHub</button>
  </div>
  <div id="scanResult" style="margin-bottom:16px"></div>
  <h3 style="margin-bottom:12px">Discovered Agents</h3>
  <div id="discoveredList"></div>
</div>

<!-- REGISTRY TAB -->
<div class="tab" id="tab-registry">
  <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center">
    <select id="regFilter" onchange="loadRegistry()" style="width:200px">
      <option value="">All Statuses</option>
      <option value="discovered">Discovered</option>
      <option value="registered">Registered</option>
      <option value="in_review">In Review</option>
      <option value="certified">Certified</option>
      <option value="rejected">Rejected</option>
      <option value="deprecated">Deprecated</option>
      <option value="suspended">Suspended</option>
    </select>
    <button class="btn" onclick="showManualRegister()">+ Register Agent</button>
  </div>
  <div id="registryTable"></div>
  <div id="agentDetail"></div>
</div>

<!-- CERTIFICATION TAB -->
<div class="tab" id="tab-certification">
  <h3 style="margin-bottom:16px">Certification Review Queue</h3>
  <div id="reviewQueue"></div>
</div>

<!-- MARKETPLACE TAB -->
<div class="tab" id="tab-marketplace">
  <div style="display:flex;gap:10px;margin-bottom:20px">
    <input id="mpSearch" placeholder="Search certified agents..." oninput="loadMarketplace()" style="flex:1">
  </div>
  <div id="mpGrid" class="grid"></div>
  <div id="mpDetail"></div>
</div>

<!-- NETWORK TAB -->
<div class="tab" id="tab-network">
  <h3 style="margin-bottom:12px">Agent Dependency Network</h3>
  <svg id="networkSvg" class="network-svg"></svg>
</div>

<!-- METRICS TAB -->
<div class="tab" id="tab-metrics">
  <div id="metricsStats" class="stats"></div>
  <div class="card"><div class="card-hd"><h3>Recent Runs</h3></div><div class="card-bd open" id="runsList"></div></div>
</div>

</div>

<div id="toastContainer"></div>

<script>
const API = '';
let allAgents = [], allReviews = [], allDiscovered = [];

// NAV
document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    n.classList.add('active');
    document.getElementById('tab-' + n.dataset.tab).classList.add('active');
    loadTab(n.dataset.tab);
  });
});

function loadTab(tab) {
  if (tab === 'dashboard') loadDashboard();
  if (tab === 'discovery') loadDiscovery();
  if (tab === 'registry') loadRegistry();
  if (tab === 'certification') loadCertification();
  if (tab === 'marketplace') loadMarketplace();
  if (tab === 'network') loadNetwork();
  if (tab === 'metrics') loadMetrics();
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function statusBadge(s) { return `<span class="badge s-${s}">${s.replace(/_/g,' ')}</span>`; }
function toast(msg, color) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = color || 'var(--green)';
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
function toggleCard(el) { el.nextElementSibling.classList.toggle('open'); }
async function api(path, opts) {
  const res = await fetch(API + path, opts);
  return res.json();
}

// DASHBOARD
async function loadDashboard() {
  const summary = await api('/api/metrics/summary');
  const sc = summary.statusCounts;
  document.getElementById('dashStats').innerHTML = `
    <div class="stat"><div class="stat-val">${summary.totalAgents}</div><div class="stat-lbl">Total Agents</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--green)">${sc.certified||0}</div><div class="stat-lbl">Certified</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--yellow)">${sc.in_review||0}</div><div class="stat-lbl">In Review</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--purple)">${sc.registered||0}</div><div class="stat-lbl">Registered</div></div>
    <div class="stat"><div class="stat-val">${summary.totalRuns}</div><div class="stat-lbl">Total Runs</div></div>
    <div class="stat"><div class="stat-val">${summary.runsThisWeek}</div><div class="stat-lbl">Runs This Week</div></div>
    <div class="stat"><div class="stat-val">${summary.successRate}%</div><div class="stat-lbl">Success Rate</div></div>
  `;

  const agents = await api('/api/agents');
  const statuses = ['certified','in_review','registered','discovered','rejected','deprecated','suspended'];
  const counts = {};
  agents.forEach(a => counts[a.status] = (counts[a.status]||0)+1);
  document.getElementById('statusChart').innerHTML = statuses.filter(s=>counts[s]).map(s => {
    const pct = Math.round((counts[s]/agents.length)*100);
    return `<div style="display:flex;align-items:center;gap:10px;margin:6px 0">
      ${statusBadge(s)} <div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;border-radius:4px" class="s-${s}"></div></div> <span style="font-size:13px;min-width:30px">${counts[s]}</span>
    </div>`;
  }).join('');

  document.getElementById('activityFeed').innerHTML = summary.recentRuns.slice(0,10).map(r => {
    const agent = agents.find(a => a.id === r.agentId);
    const color = r.status==='success'?'var(--green)':r.status==='failure'?'var(--red)':'var(--yellow)';
    return `<div class="activity-item"><div class="activity-dot" style="background:${color}"></div>
      <span><strong>${agent?.name||'Unknown'}</strong> — ${r.status} (${(r.durationMs/1000).toFixed(1)}s) · ${r.triggeredBy} · ${new Date(r.timestamp).toLocaleString()}</span></div>`;
  }).join('') || '<div class="empty">No recent activity</div>';
}

// DISCOVERY
async function loadDiscovery() {
  allDiscovered = await api('/api/discovered');
  renderDiscovered();
}

function renderDiscovered() {
  document.getElementById('discoveredList').innerHTML = allDiscovered.length === 0
    ? '<div class="empty"><h2>No discovered agents</h2><p>Scan a GitHub org to discover agents</p></div>'
    : allDiscovered.map(a => `
      <div class="card"><div class="card-hd" onclick="toggleCard(this)">
        <h3>${statusBadge(a.status)} ${esc(a.name)}</h3>
        <div><span style="color:var(--text-dim);font-size:12px">${a.owner}</span>
          <button class="btn btn-primary btn-sm" style="margin-left:8px" onclick="event.stopPropagation();promoteAgent('${a.id}')">Promote</button></div>
      </div><div class="card-bd">
        <p style="color:var(--text-dim);font-size:13px;margin-bottom:8px">${esc(a.description)}</p>
        ${a.repoUrl?`<p><a href="${a.repoUrl}" target="_blank" style="color:var(--accent);font-size:13px">${a.repoUrl}</a></p>`:''}
        <div style="margin-top:8px">${a.tags.map(t=>`<span class="dep-tag">${t}</span>`).join('')}</div>
      </div></div>`).join('');
}

async function scanGithub() {
  const owner = document.getElementById('discoverOwner').value.trim();
  const repo = document.getElementById('discoverRepo').value.trim();
  if (!owner) return;
  document.getElementById('scanResult').innerHTML = '<div style="color:var(--accent)">Scanning...</div>';
  try {
    const result = await api('/api/discover', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner,repo:repo||undefined})});
    document.getElementById('scanResult').innerHTML = `<div style="color:var(--green)">Found ${result.scanned} repos, ${result.new} new agents, ${result.duplicates} already known</div>`;
    toast(`Discovered ${result.new} new agents`);
    loadDiscovery();
  } catch(e) {
    document.getElementById('scanResult').innerHTML = `<div style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

async function promoteAgent(id) {
  await api('/api/agents', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({discoveredId:id})});
  toast('Agent promoted to registry');
  loadDiscovery();
}

// REGISTRY
async function loadRegistry() {
  const status = document.getElementById('regFilter').value;
  allAgents = await api('/api/agents' + (status ? `?status=${status}` : ''));
  document.getElementById('registryTable').innerHTML = `
    <table class="tbl"><thead><tr><th>Name</th><th>Owner</th><th>Status</th><th>Version</th><th>Capabilities</th><th>Actions</th></tr></thead>
    <tbody>${allAgents.map(a => `<tr onclick="showAgentDetail('${a.id}')" style="cursor:pointer">
      <td><strong>${esc(a.name)}</strong><br><code>${a.slug}</code></td>
      <td>${a.owner}</td><td>${statusBadge(a.status)}</td><td>${a.version}</td>
      <td>${a.capabilities.length}</td>
      <td>${getActions(a).map(act => `<button class="btn btn-sm" onclick="event.stopPropagation();doTransition('${a.id}','${act}')">${act.replace(/_/g,' ')}</button>`).join(' ')}</td>
    </tr>`).join('')}</tbody></table>`;
}

function getActions(a) {
  const map = {discovered:['promote'],registered:['submit_review'],in_review:['approve','reject','request_changes'],changes_requested:['resubmit'],certified:['deprecate','suspend'],rejected:['reregister'],deprecated:['reactivate'],suspended:['reactivate']};
  return map[a.status] || [];
}

async function doTransition(id, action) {
  await api(`/api/agents/${id}/transition`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action})});
  toast(`Agent ${action.replace(/_/g,' ')}d`);
  loadRegistry();
}

async function showAgentDetail(id) {
  const a = await api(`/api/agents/${id}`);
  document.getElementById('agentDetail').innerHTML = `
    <div class="detail-panel">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px">
        <div><h2 style="font-size:20px">${esc(a.name)}</h2><code>${a.slug}</code> · ${statusBadge(a.status)}</div>
        <button class="btn btn-sm" onclick="document.getElementById('agentDetail').innerHTML=''">Close</button>
      </div>
      <div class="form-row"><label>Description</label><textarea id="ed_desc">${esc(a.description)}</textarea></div>
      <div class="form-row"><label>Version</label><input id="ed_ver" value="${a.version}"></div>
      <div class="form-row"><label>Tags (comma-separated)</label><input id="ed_tags" value="${a.tags.join(', ')}"></div>
      <div class="form-row"><label>Dependencies (slugs, comma-separated)</label><input id="ed_deps" value="${a.dependencies.join(', ')}"></div>
      <div class="form-row"><label>Install Command</label><input id="ed_install" value="${esc(a.installCommand)}"></div>
      <div class="form-row"><label>Capabilities</label>
        <div id="capList">${a.capabilities.map((c,i)=>`<div style="display:flex;gap:8px;margin-bottom:4px"><input placeholder="Name" value="${esc(c.name)}" class="cap-name" style="width:30%"><input placeholder="Description" value="${esc(c.description)}" class="cap-desc"></div>`).join('')}
        <button class="btn btn-sm" onclick="document.getElementById('capList').insertAdjacentHTML('beforeend','<div style=\\'display:flex;gap:8px;margin-bottom:4px\\'><input placeholder=\\'Name\\' class=\\'cap-name\\' style=\\'width:30%\\'><input placeholder=\\'Description\\' class=\\'cap-desc\\'></div>')">+ Add</button>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveAgent('${a.id}')">Save Changes</button>
      ${a.reviews?.length ? `<h3 style="margin-top:20px;margin-bottom:8px">Review History</h3>${a.reviews.map(r=>`<div style="padding:8px;background:var(--surface2);border-radius:6px;margin-bottom:6px;font-size:13px">${statusBadge(r.status)} by ${r.reviewer} · ${new Date(r.submittedAt).toLocaleDateString()}${r.comments?` · "${esc(r.comments)}"`:''}}</div>`).join('')}` : ''}
    </div>`;
}

async function saveAgent(id) {
  const caps = [];
  document.querySelectorAll('.cap-name').forEach((el,i) => {
    const desc = document.querySelectorAll('.cap-desc')[i];
    if (el.value.trim()) caps.push({name:el.value.trim(),description:desc?.value?.trim()||''});
  });
  await api(`/api/agents/${id}`, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    description: document.getElementById('ed_desc').value,
    version: document.getElementById('ed_ver').value,
    tags: document.getElementById('ed_tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    dependencies: document.getElementById('ed_deps').value.split(',').map(t=>t.trim()).filter(Boolean),
    installCommand: document.getElementById('ed_install').value,
    capabilities: caps,
  })});
  toast('Agent updated');
  loadRegistry();
}

function showManualRegister() {
  document.getElementById('agentDetail').innerHTML = `
    <div class="detail-panel">
      <h2 style="margin-bottom:16px">Register New Agent</h2>
      <div class="form-row"><label>Slug (unique identifier)</label><input id="new_slug" placeholder="my-agent"></div>
      <div class="form-row"><label>Name</label><input id="new_name" placeholder="My Agent"></div>
      <div class="form-row"><label>Owner</label><input id="new_owner" placeholder="org-name"></div>
      <div class="form-row"><label>Description</label><textarea id="new_desc"></textarea></div>
      <div class="form-row"><label>Repository URL</label><input id="new_repo" placeholder="https://github.com/..."></div>
      <div class="form-row"><label>Tags (comma-separated)</label><input id="new_tags"></div>
      <button class="btn btn-primary" onclick="registerManual()">Register</button>
      <button class="btn" onclick="document.getElementById('agentDetail').innerHTML=''">Cancel</button>
    </div>`;
}

async function registerManual() {
  await api('/api/agents', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    slug:document.getElementById('new_slug').value,name:document.getElementById('new_name').value,
    owner:document.getElementById('new_owner').value,description:document.getElementById('new_desc').value,
    repoUrl:document.getElementById('new_repo').value,tags:document.getElementById('new_tags').value.split(',').map(t=>t.trim()).filter(Boolean)
  })});
  toast('Agent registered');
  document.getElementById('agentDetail').innerHTML='';
  loadRegistry();
}

// CERTIFICATION
async function loadCertification() {
  allReviews = await api('/api/reviews');
  const agents = await api('/api/agents');
  document.getElementById('reviewQueue').innerHTML = allReviews.length === 0
    ? '<div class="empty"><h2>No reviews</h2></div>'
    : allReviews.map(r => {
      const agent = agents.find(a=>a.id===r.agentId);
      return `<div class="card"><div class="card-hd" onclick="toggleCard(this)">
        <h3>${statusBadge(r.status)} ${esc(agent?.name||'Unknown Agent')}</h3>
        <span style="font-size:12px;color:var(--text-dim)">Reviewer: ${r.reviewer} · ${new Date(r.submittedAt).toLocaleDateString()}</span>
      </div><div class="card-bd ${r.status==='pending'?'open':''}">
        <ul class="checklist">
          ${Object.entries(r.checklist).map(([k,v])=>`<li><input type="checkbox" ${v?'checked':''} onchange="updateChecklist('${r.id}','${k}',this.checked)"> ${k.replace(/([A-Z])/g,' $1').replace(/^has /,'Has ')}</li>`).join('')}
        </ul>
        <div class="form-row" style="margin-top:12px"><label>Comments</label><textarea id="rc_${r.id}">${esc(r.comments)}</textarea></div>
        ${r.status==='pending'?`<div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-green" onclick="resolveReview('${r.id}','approved')">Approve</button>
          <button class="btn btn-red" onclick="resolveReview('${r.id}','rejected')">Reject</button>
          <button class="btn btn-yellow" onclick="resolveReview('${r.id}','changes_requested')">Request Changes</button>
        </div>`:`<div style="margin-top:8px">${r.resolvedAt?`Resolved: ${new Date(r.resolvedAt).toLocaleDateString()}`:''}</div>`}
      </div></div>`;
    }).join('');
}

async function updateChecklist(reviewId, key, val) {
  const review = allReviews.find(r=>r.id===reviewId);
  if(!review) return;
  const checklist = {...review.checklist, [key]: val};
  await api(`/api/reviews/${reviewId}`, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({checklist})});
}

async function resolveReview(reviewId, decision) {
  const comments = document.getElementById('rc_'+reviewId)?.value || '';
  await api(`/api/reviews/${reviewId}`, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({decision,comments})});
  toast(`Review ${decision}`);
  loadCertification();
}

// NETWORK
async function loadNetwork() {
  const data = await api('/api/metrics/network');
  const svg = document.getElementById('networkSvg');
  const w = svg.clientWidth || 800, h = 500;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

  if (data.nodes.length === 0) { svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#8b949e">No agents in network</text>'; return; }

  // Simple force layout
  const nodes = data.nodes.map((n,i) => ({...n, x: w/2 + Math.cos(i*2*Math.PI/data.nodes.length)*180, y: h/2 + Math.sin(i*2*Math.PI/data.nodes.length)*150}));
  const nodeMap = new Map(nodes.map(n=>[n.id,n]));

  const statusColor = {discovered:'#58a6ff',registered:'#bc8cff',in_review:'#d29922',certified:'#3fb950',rejected:'#f85149',deprecated:'#8b949e',suspended:'#f85149'};

  let svgContent = '';
  // Edges
  for (const e of data.edges) {
    const s = nodeMap.get(e.source), t = nodeMap.get(e.target);
    if (s && t) svgContent += `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>`;
  }
  // Arrow marker
  svgContent = `<defs><marker id="arrow" viewBox="0 0 10 10" refX="20" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#30363d"/></marker></defs>` + svgContent;
  // Nodes
  for (const n of nodes) {
    const col = statusColor[n.status] || '#58a6ff';
    svgContent += `<circle cx="${n.x}" cy="${n.y}" r="16" fill="${col}" opacity="0.9" stroke="${col}" stroke-width="2"/>`;
    svgContent += `<text x="${n.x}" y="${n.y+30}" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">${n.name.length>20?n.name.substring(0,18)+'..':n.name}</text>`;
    svgContent += `<text x="${n.x}" y="${n.y+42}" text-anchor="middle" fill="#8b949e" font-size="10">${n.status}</text>`;
  }

  svg.innerHTML = svgContent;
}

async function loadMetrics() {
  const summary = await api('/api/metrics/summary');
  document.getElementById('metricsStats').innerHTML = `
    <div class="stat"><div class="stat-val">${summary.totalRuns}</div><div class="stat-lbl">Total Runs</div></div>
    <div class="stat"><div class="stat-val">${summary.runsThisWeek}</div><div class="stat-lbl">This Week</div></div>
    <div class="stat"><div class="stat-val">${summary.successRate}%</div><div class="stat-lbl">Success Rate</div></div>
    <div class="stat"><div class="stat-val">${summary.totalAgents}</div><div class="stat-lbl">Tracked Agents</div></div>
  `;

  const agents = await api('/api/agents');
  document.getElementById('runsList').innerHTML = `<table class="tbl"><thead><tr><th>Agent</th><th>Status</th><th>Duration</th><th>Triggered By</th><th>Time</th></tr></thead>
    <tbody>${summary.recentRuns.map(r => {
      const agent = agents.find(a=>a.id===r.agentId);
      const color = r.status==='success'?'var(--green)':r.status==='failure'?'var(--red)':'var(--yellow)';
      return `<tr><td>${agent?.name||'Unknown'}</td><td><span style="color:${color};font-weight:600">${r.status}</span></td><td>${(r.durationMs/1000).toFixed(1)}s</td><td>${r.triggeredBy}</td><td>${new Date(r.timestamp).toLocaleString()}</td></tr>`;
    }).join('')}</tbody></table>`;
}
